<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Crypto (CBC + RSA)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Kriptografi Hybrid</h1>
    <h4>Block Cipher (Mode CBC) + RSA</h4>
    
    <div id="statusBox"></div>

    <div class="card">
        <h2 style="margin-top:0; color: #007bff;">Mode Enkripsi</h2>
        
        <div class="radio-group">
            <label><input type="radio" name="encMode" value="text" checked> 📝 Teks Manual</label>
            <label><input type="radio" name="encMode" value="txt-file"> 📄 Upload File TXT</label>
            <label><input type="radio" name="encMode" value="image"> 🖼️ Upload Gambar</label>
        </div>

        <div id="encTextContainer">
            <label>Pesan Rahasia:</label>
            <textarea id="encTextInput" rows="4" placeholder="Ketik pesan yang ingin dirahasiakan..."></textarea>
        </div>

        <div id="encTxtFileContainer" style="display: none;">
            <label>Pilih File TXT:</label>
            <input type="file" id="encTxtFileInput" accept=".txt">
            <div class="file-info" id="encTxtFileInfo" style="display:none;"></div>
        </div>

        <div id="encImageContainer" style="display: none;">
            <label>Pilih File Gambar (PNG, JPG, BMP, GIF):</label>
            <input type="file" id="encImageInput" accept=".png,.jpg,.jpeg,.bmp,.gif">
            <div class="file-info" id="encImageInfo" style="display:none;"></div>
        </div>

        <label>Kunci Simetrik (Wajib 8 Karakter):</label>
        <input type="text" id="encKeyInput" placeholder="Contoh: RAHASIA1" maxlength="8">
        
        <button id="btnEncrypt">Enkripsi Sekarang</button>

        <div id="encOutput" class="output-box">
            <label>Hasil Teks Sandi (Hexadecimal):</label>
            <p style="font-size: 11px; color: #666; margin: 5px 0; background: #fffacd; padding: 8px; border-radius: 3px;">
                ✓ Download file hasil enkripsi menggunakan tombol di bawah
            </p>
            <textarea id="encResultText" rows="4" readonly style="max-height: 200px; overflow-y: auto;"></textarea>
            <div class="hex-preview" id="hexPreview"></div>
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button class="copy-btn" style="flex: 1;" onclick="copyToClipboard('encResultText')">📋 Copy Hex</button>
                <button class="copy-btn" style="flex: 1;" onclick="downloadEncHex()">⬇️ Download Hex (.txt)</button>
                <button class="copy-btn" style="flex: 1;" onclick="downloadEncJson()">⬇️ Download Key (JSON)</button>
            </div>
        </div>
    </div>

    <div class="card decrypt">
        <h2 style="margin-top:0; color: #28a745;">Mode Dekripsi</h2>

        <div class="radio-group">
            <label><input type="radio" name="decMode" value="paste" checked> 📝 Paste Hex Manual</label>
            <label><input type="radio" name="decMode" value="file"> 📁 Upload File Hex (.txt)</label>
        </div>

        <div id="decPasteContainer">
            <label>Teks Sandi (Hexadecimal):</label>
            <textarea id="decTextInput" rows="4" placeholder="Paste teks hasil enkripsi di sini (bisa dengan spasi, dash, atau colon)..." style="max-height: 200px; overflow-y: auto;"></textarea>
        </div>

        <div id="decFileContainer" style="display: none;">
            <label>Upload File Hex (Hasil_Enkripsi.txt):</label>
            <input type="file" id="decHexFile" accept=".txt">
            <div class="file-info" id="hexFileInfo" style="display:none;"></div>
        </div>

        <label>File Kunci Akses (Kunci_Akses.json):</label>
        <input type="file" id="decAccessKeyFile" accept=".json">
        
        <label>Kunci Simetrik (8 Karakter - HARUS SAMA seperti saat enkripsi):</label>
        <input type="text" id="decKeyInput" placeholder="Contoh: RAHASIA1" maxlength="8">
        <p style="font-size: 11px; color: #d9534f; margin: 5px 0;">⚠️ Kunci HARUS tepat sama! Salah 1 karakter = error total, gak ada output!</p>
        
        <button id="btnDecrypt" class="btn-success">Buka Sandi</button>

        <div id="decOutput" class="output-box success">
            <label>Hasil Pesan Asli:</label>
            <textarea id="decResultText" rows="4" readonly style="max-height: 200px; overflow-y: auto;"></textarea>
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button class="copy-btn" id="copyDecBtn" style="flex: 1;" onclick="copyToClipboard('decResultText')">📋 Copy</button>
                <button class="copy-btn" id="downloadDecBtn" style="flex: 1; display: none;" onclick="downloadDecResult()">⬇️ Download</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
